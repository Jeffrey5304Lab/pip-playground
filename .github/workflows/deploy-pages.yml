name: Deploy to GitHub Pages

# Manual-only for now: deployment is parked, and GitHub Pages can't publish from a
# private repo on the free plan (the build would fail at configure-pages). Enable
# Pages (make the repo public or upgrade) and run this from the Actions tab when
# ready — or just use Netlify (netlify.toml) which deploys from a private repo.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static bundle
        run: node scripts/build-web.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
