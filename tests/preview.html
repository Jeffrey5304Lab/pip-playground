<!doctype html><html><head><meta charset="utf-8">
<style>
body{margin:0;background:#eef4f8;font-family:sans-serif;padding:20px;display:flex;flex-wrap:wrap;gap:16px}
.cell{background:#fffaf0;border-radius:20px;padding:10px;width:120px;text-align:center;box-shadow:0 8px 16px rgba(120,90,50,.18)}
.cell svg{width:100px;height:100px}
.cell .glyph{width:48px;height:48px}
.cell small{display:block;color:#5a4632;font-weight:600;margin-top:4px}
.dark{background:#5a4632}
</style></head><body>
<script type="module">
import { animal, ANIMAL_NAMES, icon, ui, rewardArt, star } from "../src/art.js";
const root=document.body;
function add(svg,label,dark){const d=document.createElement('div');d.className='cell'+(dark?' dark':'');d.innerHTML=svg+`<small style="${dark?'color:#fff':''}">${label}</small>`;root.appendChild(d);}
ANIMAL_NAMES.forEach(n=>add(animal(n),n));
Object.entries(icon).forEach(([k,f])=>add(f(),'icon:'+k));
Object.entries(ui).forEach(([k,f])=>add(f(),'ui:'+k, k.includes('replay')));
rewardArt.forEach((f,i)=>add(f(),'reward'+i));
add(star(true),'star');
</script>
</body></html>
